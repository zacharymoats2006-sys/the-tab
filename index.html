<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>THE TAB</title>
    <style>
        :root { 
            --safe: #00ff88; --social: #00ccff; --buzzed: #FFCC00; 
            --impaired: #ff9900; --danger: #DA0A13; --critical: #7a0000; --dark: #000; 
        }
        body { 
            background: var(--dark); color: #fff; font-family: -apple-system, system-ui;
            margin: 0; padding: env(safe-area-inset-top) 20px 100px 20px;
            -webkit-tap-highlight-color: transparent;
        }
        header { text-align: center; padding: 10px 0; }
        .bac-display { font-size: 7rem; font-weight: 900; line-height: 1; letter-spacing: -6px; margin: 5px 0; transition: color 0.5s ease; }
        #stage-pill { display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; border: 1px solid #333; margin-bottom: 10px; transition: all 0.5s ease; }
        
        .hud-counters { display: flex; justify-content: space-around; background: #0a0a0a; padding: 15px; border-radius: 20px; border: 1px solid #1a1a1a; margin-bottom: 20px; }
        .hud-item { text-align: center; flex: 1; }
        .hud-label { font-size: 0.55rem; color: #444; text-transform: uppercase; font-weight: 800; }
        .hud-val { font-size: 1.5rem; font-weight: 900; display: block; margin-top: 5px; color: #fff; }

        .shot-bay { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .shot-btn { background: #111; border: 1px solid #222; color: #fff; padding: 15px 5px; border-radius: 15px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        .shot-btn:active { background: #222; transform: scale(0.98); }

        .search-box { position: sticky; top: 10px; z-index: 100; margin-bottom: 15px; }
        #drink-search { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid #333; background: #161618; color: #fff; font-size: 1rem; box-sizing: border-box; }
        .search-results { background: #161618; border-radius: 18px; margin-top: 8px; max-height: 400px; overflow-y: auto; display: none; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .search-item { padding: 16px; border-bottom: 1px solid #222; }
        .time-options { display: flex; gap: 8px; margin-top: 12px; }
        .time-btn { flex: 1; background: #222; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 10px; font-size: 0.65rem; font-weight: 700; }
        .time-btn:active { background: #444; }

        .history-container { margin-top: 20px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #111; font-size: 0.8rem; color: #333; }
        .edit-btn { background: #111; border: none; color: #555; padding: 4px 8px; border-radius: 5px; font-size: 0.6rem; }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div id="stage-pill">Sober</div>
        <div class="bac-display" id="bac">.000</div>
        <div id="analysis" style="font-size: 0.8rem; color: #444; margin-bottom: 15px;">Kinetic Engine Active</div>
    </header>

    <div class="hud-counters">
        <div class="hud-item"><span class="hud-label">Shots</span><span class="hud-val" id="shot-count" style="color: var(--impaired);">0</span></div>
        <div class="hud-item"><span class="hud-label">Cans/Mixed</span><span class="hud-val" id="can-count" style="color: var(--social);">0</span></div>
    </div>

    <div class="shot-bay">
        <button class="shot-btn" onclick="add('Tequila Shot', 1.5, 0.40, true, 0)" style="border-color: #FFD700; color: #FFD700;">Tequila</button>
        <button class="shot-btn" onclick="add('Vodka Shot', 1.5, 0.40, true, 0)" style="border-color: #00ccff; color: #00ccff;">Vodka</button>
        <button class="shot-btn" onclick="add('Whiskey Shot', 1.5, 0.40, true, 0)" style="border-color: #ff9900; color: #ff9900;">Whiskey</button>
    </div>

    <div class="search-box">
        <input type="text" id="drink-search" placeholder="Search (Mich Ultra, Surfside...)" oninput="searchDrinks()">
        <div id="results" class="search-results"></div>
    </div>

    <div class="history-container" id="history-list"></div>
    <button onclick="if(confirm('Wipe session?')){localStorage.clear(); location.reload();}" style="margin-top:40px; width:100%; background:none; border:none; color:#1a1a1a; font-size:0.6rem; letter-spacing:3px; padding:20px;">PURGE SYSTEM</button>
</div>

<script>
    const drinkDB = [
        { name: "Michelob Ultra", abv: 0.042, oz: 12 }, { name: "Busch Light", abv: 0.041, oz: 12 },
        { name: "Surfside Iced Tea", abv: 0.045, oz: 12 }, { name: "Truly Unruly", abv: 0.08, oz: 12 },
        { name: "BeatBox", abv: 0.111, oz: 16.9 }, { name: "Four Loko", abv: 0.14, oz: 24 },
        { name: "Vodka Soda (Mixed)", abv: 0.09, oz: 10 }, { name: "High Noon", abv: 0.045, oz: 12 },
        { name: "AMF", abv: 0.20, oz: 12 }, { name: "Water", abv: 0, oz: 16 }
    ];

    let session = JSON.parse(localStorage.getItem('tab_v11_session')) || [];
    // Recalibrated Widmark Constant for accuracy
    let bio = { weight: 175, sex: 0.68 }; 

    function searchDrinks() {
        const query = document.getElementById('drink-search').value.toLowerCase();
        const resDiv = document.getElementById('results');
        if(!query) { resDiv.style.display = 'none'; return; }
        const filtered = drinkDB.filter(d => d.name.toLowerCase().includes(query));
        
        resDiv.innerHTML = filtered.map(d => `
            <div class="search-item">
                <div style="display:flex; justify-content:space-between; font-weight:700; font-size:0.9rem;">
                    <span>${d.name}</span><span>${(d.abv*100).toFixed(1)}%</span>
                </div>
                <div class="time-options">
                    <button class="time-btn" onclick="add('${d.name}', ${d.oz}, ${d.abv}, false, 0)">Now</button>
                    <button class="time-btn" onclick="add('${d.name}', ${d.oz}, ${d.abv}, false, 30)">-30m</button>
                    <button class="time-btn" onclick="add('${d.name}', ${d.oz}, ${d.abv}, false, 60)">-1h</button>
                </div>
            </div>
        `).join('');
        resDiv.style.display = 'block';
    }

    function add(name, oz, abv, isShot, offset) {
        const time = Date.now() - (offset * 60000);
        session.push({ name, oz, abv, time, isShot, id: Math.random() });
        localStorage.setItem('tab_v11_session', JSON.stringify(session));
        document.getElementById('drink-search').value = "";
        document.getElementById('results').style.display = 'none';
        update();
    }

    function removeDrink(id) {
        session = session.filter(d => d.id !== id);
        localStorage.setItem('tab_v11_session', JSON.stringify(session));
        update();
    }

    function update() {
        const now = Date.now();
        let totalBac = 0;
        let sCount = 0;
        let cCount = 0;
        const metabolismRate = 0.015; // Hourly decay

        session.forEach(d => {
            if(d.abv > 0) {
                const hrsSinceDrink = (now - d.time) / 3600000;
                // Widmark Formula: (Pure Alcohol oz * 5.14 / Weight * r) - (Rate * Time)
                const rawBacContribution = (d.oz * d.abv * 5.14) / (bio.weight * bio.sex);
                const decayedBac = rawBacContribution - (metabolismRate * hrsSinceDrink);
                
                if (decayedBac > 0) totalBac += decayedBac;
                if (d.isShot) sCount++; else cCount++;
            }
        });

        // UI Updates
        const displayBac = totalBac.toFixed(4).substring(1); // Real-time 4-digit precision
        document.getElementById('bac').innerText = displayBac;
        document.getElementById('shot-count').innerText = sCount;
        document.getElementById('can-count').innerText = cCount;

        // Dynamic Styling
        let color = "var(--safe)";
        let stage = "Sober";
        if (totalBac >= 0.02) { color = "var(--social)"; stage = "Euphoria"; }
        if (totalBac >= 0.08) { color = "var(--impaired)"; stage = "Excitement"; }
        if (totalBac >= 0.18) { color = "var(--danger)"; stage = "Confusion"; }
        if (totalBac >= 0.25) { color = "var(--critical)"; stage = "Stupor"; }

        const pill = document.getElementById('stage-pill');
        pill.innerText = stage;
        pill.style.color = color;
        pill.style.borderColor = color;
        document.getElementById('bac').style.color = color;

        // History with Edit/Remove
        document.getElementById('history-list').innerHTML = session.slice().reverse().slice(0, 5).map(d => {
            const t = new Date(d.time);
            const ts = t.getHours() + ":" + (t.getMinutes()<10?'0':'') + t.getMinutes();
            return `
                <div class="history-item">
                    <span>${d.name} <small style="color:#222; margin-left:10px;">${ts}</small></span>
                    <button class="edit-btn" onclick="removeDrink(${d.id})">Remove</button>
                </div>
            `;
        }).join('');
    }

    // High-frequency update (every 1 second) to show live metabolic decay
    update();
    setInterval(update, 1000);
</script>
</body>
</html>
