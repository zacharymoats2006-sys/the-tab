<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>THE TAB</title>
    <style>
        :root { --safe: #00ff88; --social: #00ccff; --impaired: #ff9900; --danger: #DA0A13; --dark: #000; }
        body { background: var(--dark); color: #fff; font-family: -apple-system, system-ui; margin: 0; padding: env(safe-area-inset-top) 20px 100px 20px; overflow-x: hidden; }
        
        /* Prevent the BAC text from blocking clicks */
        .bac-display { font-size: 7.5rem; font-weight: 900; text-align: center; letter-spacing: -6px; margin: 10px 0; pointer-events: none; position: relative; z-index: 1; }
        #stage-pill { display: block; width: fit-content; margin: 0 auto 10px; padding: 5px 15px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; border: 1px solid #333; pointer-events: none; }
        
        .hud-counters { display: flex; justify-content: space-around; background: #0a0a0a; padding: 15px; border-radius: 20px; border: 1px solid #1a1a1a; margin-bottom: 20px; pointer-events: none; }
        .hud-item { text-align: center; flex: 1; }
        .hud-label { font-size: 0.55rem; color: #444; text-transform: uppercase; font-weight: 800; }
        .hud-val { font-size: 1.5rem; font-weight: 900; display: block; margin-top: 5px; }

        /* Buttons need high z-index and pointer cursor for mobile */
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; position: relative; z-index: 999; }
        .cat-btn { background: #111; border: 1px solid #222; color: #777; padding: 18px; border-radius: 12px; font-weight: 800; text-transform: uppercase; font-size: 0.7rem; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .cat-btn:active { background: #333; color: #fff; }
        .cat-btn.active { border-color: #fff; color: #fff; background: #1a1a1a; }

        .inventory-list { background: #0a0a0a; border-radius: 20px; border: 1px solid #1a1a1a; max-height: 300px; overflow-y: auto; display: none; margin-bottom: 20px; position: relative; z-index: 999; }
        .drink-row { padding: 15px 20px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        .drink-info b { display: block; font-size: 0.9rem; pointer-events: none; }
        .drink-info span { font-size: 0.65rem; color: #444; pointer-events: none; }
        .add-btn { background: #fff; color: #000; border: none; padding: 12px 18px; border-radius: 8px; font-size: 0.75rem; font-weight: 900; cursor: pointer; z-index: 1000; }
    </style>
</head>
<body>

<div id="stage-pill">Sober</div>
<div class="bac-display" id="bac">.0000</div>

<div class="hud-counters">
    <div class="hud-item"><span class="hud-label">Shots</span><span class="hud-val" id="s-count" style="color: var(--impaired);">0</span></div>
    <div class="hud-item"><span class="hud-label">Cans/Other</span><span class="hud-val" id="c-count" style="color: var(--social);">0</span></div>
</div>

<div class="cat-grid">
    <button class="cat-btn" onclick="showCat('beer', this)">Beer</button>
    <button class="cat-btn" onclick="showCat('seltz', this)">Seltz/Tea</button>
    <button class="cat-btn" onclick="showCat('mixed', this)">Mixed</button>
    <button class="cat-btn" onclick="showCat('liquor', this)">Liquor</button>
    <button class="cat-btn" onclick="showCat('wine', this)">Wine</button>
    <button class="cat-btn" onclick="showCat('cider', this)">Cider</button>
</div>

<div id="inv" class="inventory-list"></div>

<script>
    const db = {
        beer: [{n:"Michelob Ultra",a:0.042,v:12},{n:"Busch Light",a:0.041,v:12},{n:"Coors Banquet",a:0.05,v:12},{n:"Voodoo Ranger",a:0.09,v:12}],
        seltz: [{n:"Surfside Tea",a:0.045,v:12},{n:"Surfside Lemon",a:0.045,v:12},{n:"High Noon",a:0.045,v:12},{n:"White Claw Surge",a:0.08,v:12},{n:"BeatBox",a:0.111,v:16.9}],
        mixed: [{n:"Margarita",a:0.15,v:8},{n:"Moscow Mule",a:0.11,v:10},{n:"Long Island",a:0.22,v:12},{n:"Vodka Soda",a:0.10,v:10}],
        liquor: [{n:"Tequila Shot",a:0.40,v:1.5,s:true},{n:"Vodka Shot",a:0.40,v:1.5,s:true},{n:"Fireball",a:0.33,v:1.5,s:true},{n:"Pink Whitney",a:0.30,v:1.5,s:true}],
        wine: [{n:"Red Wine",a:0.13,v:5},{n:"White Wine",a:0.12,v:5},{n:"Prosecco",a:0.11,v:5}],
        cider: [{n:"Angry Orchard",a:0.05,v:12},{n:"Downeast",a:0.051,v:12}]
    };

    let logs = JSON.parse(localStorage.getItem('tab_v17_logs')) || [];
    let weight = 175; let r = 0.68;

    function showCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const inv = document.getElementById('inv');
        inv.innerHTML = db[cat].map(d => `
            <div class="drink-row">
                <div class="drink-info"><b>${d.n}</b><span>${(d.a*100).toFixed(1)}% | ${d.v}oz</span></div>
                <button class="add-btn" onclick="add('${d.n}',${d.a},${d.v},${d.s?true:false})">ADD</button>
            </div>
        `).join('');
        inv.style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function add(n, a, v, s) {
        logs.push({ n, a, v, s, t: Date.now() });
        localStorage.setItem('tab_v17_logs', JSON.stringify(logs));
        update();
    }

    function update() {
        const now = Date.now();
        let curBac = 0, shots = 0, cans = 0;
        logs.forEach(d => {
            const hrs = (now - d.t) / 3600000;
            const drinkBac = (d.v * d.a * 5.14 / (weight * r)) - (0.015 * hrs);
            if (drinkBac > 0) curBac += drinkBac;
            if (d.s) shots++; else if (d.a > 0) cans++;
        });

        document.getElementById('bac').innerText = curBac.toFixed(4).substring(1);
        document.getElementById('s-count').innerText = shots;
        document.getElementById('c-count').innerText = cans;

        let col = "var(--safe)", st = "Sober";
        if(curBac > .02) { col="var(--social)"; st="Euphoria"; }
        if(curBac > .08) { col="var(--impaired)"; st="Excitement"; }
        if(curBac > .18) { col="var(--danger)"; st="Confusion"; }
        
        const pill = document.getElementById('stage-pill');
        pill.innerText = st; pill.style.color = col; pill.style.borderColor = col;
        document.getElementById('bac').style.color = col;
    }

    setInterval(update, 1000); update();
</script>
</body>
</html>
