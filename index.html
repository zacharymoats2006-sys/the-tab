<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>THE TAB v18.4</title>
    <style>
        :root {
            --bg-color: #000;
            --card-bg: #1c1c1e;
            --accent-blue: #0a84ff;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --border: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
        }

        .dashboard, .settings-panel {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .bac-display {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--accent-blue);
            margin: 10px 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 12px;
        }

        .input-group {
            margin: 15px 0;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 5px;
        }

        input[type="number"], input[type="range"] {
            width: 100%;
            background: #2c2c2e;
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        button {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: white;
            padding: 18px;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 600;
        }

        button:active { background: #2c2c2e; transform: scale(0.98); }
        .beer-btn { border-color: #ffcc00; }
        .seltz-btn { border-color: #5856d6; }
        .liquor-btn { border-color: #ff3b30; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="dashboard" id="mainUI">
        <div style="font-size: 0.8rem; color: var(--text-dim);">ESTIMATED BAC</div>
        <div class="bac-display" id="bac">0.000</div>
        
        <div class="stats-grid">
            <div class="stat-box">
                <div style="font-size: 0.7rem;">TOTAL DRINKS</div>
                <div id="total-count" style="font-size: 1.2rem;">0</div>
            </div>
            <div class="stat-box">
                <div style="font-size: 0.7rem;">TIME SINCE LAST</div>
                <div id="timer" style="font-family: monospace;">00:00:00</div>
            </div>
        </div>
        <button onclick="toggleSettings()" style="padding: 8px 15px; font-size: 0.7rem; border-radius: 20px;">Edit Profile</button>
    </div>

    <div class="settings-panel hidden" id="settingsUI">
        <h3>User Profile</h3>
        <div class="input-group">
            <label>Weight (lbs)</label>
            <input type="number" id="userWeight" value="180" onchange="saveProfile()">
        </div>
        <div class="input-group">
            <label>Height: <span id="heightLabel">5'10"</span></label>
            <input type="range" id="userHeight" min="48" max="84" value="70" oninput="updateHeightLabel()" onchange="saveProfile()">
        </div>
        <div class="input-group">
            <label>Age</label>
            <input type="number" id="userAge" value="21" onchange="saveProfile()">
        </div>
        <button onclick="toggleSettings()" style="width: 100%; background: var(--accent-blue);">Save & Close</button>
    </div>

    <div class="btn-grid" id="controls">
        <button class="beer-btn" onclick="addDrink(0.042)">BEER<br><small>12oz 4.2%</small></button>
        <button class="seltz-btn" onclick="addDrink(0.05)">SELTZ/TEA<br><small>12oz 5%</small></button>
        <button class="liquor-btn" onclick="addDrink(0.40, 1.5)">SHOT<br><small>1.5oz 40%</small></button>
        <button style="border-color: #34c759;" onclick="alert('Custom added')">+ CUSTOM</button>
        <button style="grid-column: span 2; margin-top: 10px; color: #ff3b30;" onclick="resetTab()">RESET SESSION</button>
    </div>

    <script>
        // Load Profile or Defaults
        let profile = JSON.parse(localStorage.getItem('tabProfile')) || {
            weight: 180,
            heightInches: 70,
            age: 21
        };

        let sessionData = JSON.parse(localStorage.getItem('tabSession')) || {
            startTime: null,
            lastDrinkTime: null,
            totalAlcoholOz: 0,
            drinkCount: 0
        };

        function updateHeightLabel() {
            const inches = document.getElementById('userHeight').value;
            const feet = Math.floor(inches / 12);
            const remainingInches = inches % 12;
            document.getElementById('heightLabel').innerText = `${feet}'${remainingInches}"`;
        }

        function saveProfile() {
            profile.weight = parseFloat(document.getElementById('userWeight').value);
            profile.heightInches = parseInt(document.getElementById('userHeight').value);
            profile.age = parseInt(document.getElementById('userAge').value);
            localStorage.setItem('tabProfile', JSON.stringify(profile));
            updateBAC();
        }

        function toggleSettings() {
            document.getElementById('mainUI').classList.toggle('hidden');
            document.getElementById('controls').classList.toggle('hidden');
            document.getElementById('settingsUI').classList.toggle('hidden');
        }

        function addDrink(abv, sizeOz = 12) {
            const now = Date.now();
            if (!sessionData.startTime) sessionData.startTime = now;
            sessionData.lastDrinkTime = now;
            sessionData.totalAlcoholOz += (sizeOz * abv);
            sessionData.drinkCount++;
            saveAndRefresh();
        }

        function updateBAC() {
            if (!sessionData.startTime) return;
            const now = Date.now();
            const hoursPassed = (now - sessionData.startTime) / 3600000;
            
            // Widmark with dynamic profile
            const r = 0.68; // Standard male constant
            let rawBAC = (sessionData.totalAlcoholOz * 5.14 / (profile.weight * r));
            let currentBAC = rawBAC - (0.015 * hoursPassed);
            
            document.getElementById('bac').innerText = Math.max(0, currentBAC).toFixed(3);
            
            if (sessionData.lastDrinkTime) {
                const diff = Math.floor((now - sessionData.lastDrinkTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }
        }

        function saveAndRefresh() {
            //localStorage.setItem('tabSession', JSON.stringify(sessionData));
            document.getElementById('total-count').innerText = sessionData.drinkCount;
            document.getElementById("bac").innerText = ".0000";
            updateBAC();
        }

        function resetTab() {
            if (confirm("Reset the tab?")) {
                sessionData = { startTime: null, lastDrinkTime: null, totalAlcoholOz: 0, drinkCount: 0 };
                saveAndRefresh();
            }
        }

        // Initialize UI
        document.getElementById('userWeight').value = profile.weight;
        document.getElementById('userHeight').value = profile.heightInches;
        document.getElementById('userAge').value = profile.age;
        updateHeightLabel();
        //setInterval(updateBAC, 1000);
        saveAndRefresh();
    </script>
</body>
</html>
