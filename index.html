<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>THE TAB v18.3</title>
    
    <style>
        :root { --safe: #00ff88; --social: #00ccff; --impaired: #ff9900; --danger: #DA0A13; --dark: #000; }
        body { background: var(--dark); color: #fff; font-family: -apple-system, system-ui; margin: 0; padding: env(safe-area-inset-top) 20px 140px 20px; overflow-x: hidden; }
        
        /* HUD - DO NOT TOUCH */
        .bac-display { font-size: 7.5rem; font-weight: 900; text-align: center; letter-spacing: -6px; margin: 10px 0; pointer-events: none; }
        #stage-pill { display: block; width: fit-content; margin: 0 auto 10px; padding: 5px 15px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; border: 1px solid #333; }
        
        .hud-counters { display: flex; justify-content: space-around; background: #0a0a0a; padding: 15px; border-radius: 20px; border: 1px solid #1a1a1a; margin-bottom: 20px; }
        .hud-item { text-align: center; flex: 1; }
        .hud-label { font-size: 0.55rem; color: #444; text-transform: uppercase; font-weight: 800; }
        .hud-val { font-size: 1.5rem; font-weight: 900; display: block; margin-top: 5px; }

        /* PROFILE SECTION */
        .prof-box { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 15px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .prof-field label { font-size: 0.55rem; color: #444; text-transform: uppercase; font-weight: 800; display: block; margin-bottom: 5px; }
        .prof-field input, .prof-field select { width: 100%; background: #111; border: 1px solid #222; color: #fff; padding: 10px; border-radius: 10px; font-size: 0.85rem; box-sizing: border-box; }

        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .cat-btn { background: #111; border: 1px solid #222; color: #777; padding: 18px; border-radius: 12px; font-weight: 800; text-transform: uppercase; font-size: 0.7rem; cursor: pointer; }
        .cat-btn.active { border-color: #fff; color: #fff; background: #1a1a1a; }

        .inventory-list { background: #0a0a0a; border-radius: 20px; border: 1px solid #1a1a1a; max-height: 400px; overflow-y: auto; display: none; margin-bottom: 20px; }
        .drink-row { padding: 15px 20px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        .drink-info b { display: block; font-size: 0.9rem; }
        .drink-info span { font-size: 0.65rem; color: #444; }
        .add-btn { background: #fff; color: #000; border: none; padding: 12px 18px; border-radius: 8px; font-size: 0.75rem; font-weight: 900; }
        
        .custom-form { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; display: none; margin-bottom: 20px; }
        .custom-form input, .custom-form select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #222; background: #000; color: #fff; font-size: 1rem; }
        .save-custom-btn { background: var(--social); color: #000; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: 800; text-transform: uppercase; }

        .controls { position: fixed; bottom: 30px; left: 20px; right: 20px; display: flex; gap: 10px; z-index: 9999; }
        .ctrl-btn { flex: 1; padding: 18px; border-radius: 15px; border: 1px solid #222; background: #0a0a0a; color: #fff; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

<div id="stage-pill">Sober</div>
<div class="bac-display" id="bac">.0000</div>

<div class="hud-counters">
    <div class="hud-item"><span class="hud-label">Shots</span><span id="s-count" class="hud-val" style="color: var(--impaired);">0</span></div>
    <div class="hud-item"><span class="hud-label">Cans/Other</span><span id="c-count" class="hud-val" style="color: var(--social);">0</span></div>
    <div class="hud-item"><span class="hud-label">Last Drink</span><span id="last-timer" class="hud-val" style="color: #fff;">--</span></div>
</div>

<div class="prof-box">
    <div class="prof-field">
        <label>Weight (lbs)</label>
        <input type="number" id="p-w" value="175" onchange="upProf()">
    </div>
    <div class="prof-field">
        <label>Age</label>
        <input type="number" id="p-a" value="21" onchange="upProf()">
    </div>
    <div class="prof-field" style="grid-column: span 2;">
        <label>Height</label>
        <select id="p-h" onchange="upProf()"></select>
    </div>
</div>

<div class="cat-grid">
    <button class="cat-btn" onclick="showCat('beer', this)">Beer</button>
    <button class="cat-btn" onclick="showCat('seltz', this)">Seltz/Tea</button>
    <button class="cat-btn" onclick="showCat('mixed', this)">Mixed</button>
    <button class="cat-btn" onclick="showCat('liquor', this)">Liquor</button>
    <button class="cat-btn" onclick="showCat('custom', this)" style="border-color: var(--social); color: var(--social); grid-column: span 2;">+ Custom Drinks</button>
</div>

<div id="custom-ui" class="custom-form">
    <input type="text" id="cust-name" placeholder="Drink Name">
    <input type="number" id="cust-abv" placeholder="ABV %" step="0.1">
    <input type="number" id="cust-oz" placeholder="Ounces">
    <select id="cust-type">
        <option value="false">Can/Bottle/Mixed</option>
        <option value="true">Shot</option>
    </select>
    <button class="save-custom-btn" onclick="saveNewDrink()">Save & Add</button>
</div>

<div id="inv" class="inventory-list"></div>

<div class="controls">
    <button class="ctrl-btn" onclick="undo()">Undo Last</button>
    <button class="ctrl-btn" style="color: var(--danger); border-color: var(--danger);" onclick="resetSession()">Reset Night</button>
</div>

<script>
    const staticDB = {
        beer: [
            {n:"Bud Light",a:0.042,v:12}, {n:"Modelo Especial",a:0.044,v:12}, 
            {n:"Yuengling",a:0.045,v:12}, {n:"Miller Lite",a:0.042,v:12}, 
            {n:"Coors Light",a:0.042,v:12}, {n:"Michelob Ultra",a:0.042,v:12}, 
            {n:"Busch Light",a:0.041,v:12}, {n:"Corona Extra",a:0.046,v:12},
            {n:"Voodoo Ranger",a:0.09,v:12}
        ],
        seltz: [
            {n:"High Noon",a:0.045,v:12}, {n:"White Claw",a:0.05,v:12}, 
            {n:"Truly",a:0.05,v:12}, {n:"Twisted Tea",a:0.05,v:12}, 
            {n:"Surfside Tea",a:0.045,v:12}, {n:"BeatBox",a:0.111,v:16.9}, 
            {n:"Four Loko",a:0.14,v:24}
        ],
        mixed: [
            {n:"Monaco Cocktail",a:0.09,v:12}, {n:"Cutwater Marg",a:0.125,v:12}, 
            {n:"Long Drink",a:0.055,v:12}, {n:"Vodka Soda",a:0.09,v:10}, 
            {n:"Margarita",a:0.15,v:8}, {n:"Long Island",a:0.22,v:12}
        ],
        liquor: [
            {n:"Tequila Shot",a:0.40,v:1.5,s:true}, {n:"Vodka Shot",a:0.40,v:1.5,s:true}, 
            {n:"Whiskey Shot",a:0.40,v:1.5,s:true}, {n:"Fireball",a:0.33,v:1.5,s:true}, 
            {n:"Pink Whitney",a:0.30,v:1.5,s:true}
        ]
    };

    let logs = JSON.parse(localStorage.getItem('tab_v18_logs')) || [];
    let customDrinks = JSON.parse(localStorage.getItem('tab_custom_db')) || [];
    let p = JSON.parse(localStorage.getItem('tab_p')) || { w: 175, a: 21, h: 70 };

    const hEl = document.getElementById('p-h');
    for(let i = 48; i <= 84; i++) {
        let o = document.createElement('option');
        o.value = i; o.text = Math.floor(i/12)+"'"+(i%12)+'"';
        if(i === p.h) o.selected = true;
        hEl.appendChild(o);
    }
    document.getElementById('p-w').value = p.w;
    document.getElementById('p-a').value = p.a;

    function upProf() {
        p = { w: parseInt(document.getElementById('p-w').value)||175, a: parseInt(document.getElementById('p-a').value)||21, h: parseInt(document.getElementById('p-h').value)||70 };
        localStorage.setItem('tab_p', JSON.stringify(p));
        update();
    }

    function showCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const inv = document.getElementById('inv');
        const customUI = document.getElementById('custom-ui');
        customUI.style.display = (cat === 'custom') ? 'block' : 'none';
        let list = (cat === 'custom') ? customDrinks : staticDB[cat];
        if (list && list.length > 0) {
            inv.innerHTML = list.map(d => `
                <div class="drink-row">
                    <div class="drink-info"><b>${d.n}</b><span>${(d.a*100).toFixed(1)}% | ${d.v}oz</span></div>
                    <button class="add-btn" onclick="add('${d.n}',${d.a},${d.v},${d.s?true:false})">ADD</button>
                </div>`).join('');
            inv.style.display = 'block';
        } else { inv.style.display = 'none'; }
    }

    function saveNewDrink() {
        const n = document.getElementById('cust-name').value;
        const a = parseFloat(document.getElementById('cust-abv').value)/100, v = parseFloat(document.getElementById('cust-oz').value);
        const s = document.getElementById('cust-type').value === "true";
        if (!n || isNaN(a) || isNaN(v)) return;
        customDrinks.push({ n, a, v, s });
        localStorage.setItem('tab_custom_db', JSON.stringify(customDrinks));
        add(n, a, v, s);
        document.getElementById('cust-name').value = ''; document.getElementById('cust-abv').value = ''; document.getElementById('cust-oz').value = '';
        showCat('custom', document.querySelector('.cat-btn[onclick*="custom"]'));
    }

    function add(n, a, v, s) { logs.push({ n, a, v, s, t: Date.now() }); save(); }
    function undo() { logs.pop(); save(); }
    function resetSession() { if(confirm("Clear BAC?")) { logs = []; save(); } }
    function save() { localStorage.setItem('tab_v18_logs', JSON.stringify(logs)); update(); }

    function update() {
        const now = Date.now();
        let curBac = 0, shots = 0, cans = 0, lastT = null;
        logs.forEach(d => {
            const hrs = (now - d.t) / 3600000;
            const dBac = (d.v * d.a * 5.14 / (p.w * 0.68)) - (0.015 * hrs);
            if (dBac > 0) curBac += dBac;
            if (d.s) shots++; else if (d.a > 0) cans++;
            if (!lastT || d.t > lastT) lastT = d.t;
        });
        document.getElementById('bac').innerText = curBac.toFixed(4).substring(1);
        document.getElementById('s-count').innerText = shots;
        document.getElementById('c-count').innerText = cans;
        const timerEl = document.getElementById('last-timer');
        if (lastT) { timerEl.innerText = Math.floor((now - lastT) / 60000) + "m"; } else { timerEl.innerText = "--"; }
        let col = "var(--safe)", st = "Sober";
        if(curBac > .02) { col="var(--social)"; st="Euphoria"; }
        if(curBac > .08) { col="var(--impaired)"; st="Excitement"; }
        if(curBac > .18) { col="var(--danger)"; st="Confusion"; }
        const pill = document.getElementById('stage-pill');
        pill.innerText = st; pill.style.color = col; pill.style.borderColor = col;
        document.getElementById('bac').style.color = col;
    }

    setInterval(update, 1000);
    update();
</script>
</body>
</html>
