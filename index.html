<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>THE TAB v20.0</title>
    <style>
        :root { 
            --safe: #00ff88; --social: #00ccff; --buzzed: #FFCC00; 
            --impaired: #ff9900; --danger: #DA0A13; --critical: #7a0000; --dark: #000; 
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; touch-action: manipulation; }
        body { 
            background: var(--dark); color: #fff; font-family: -apple-system, system-ui;
            margin: 0; padding: env(safe-area-inset-top) 20px 120px 20px;
            overflow-x: hidden;
        }
        header { text-align: center; padding: 20px 0; position: sticky; top: 0; background: black; z-index: 5000; }
        .bac-display { font-size: 7rem; font-weight: 900; line-height: 1; letter-spacing: -6px; margin: 5px 0; pointer-events: none; }
        #stage-pill { display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; border: 1px solid #333; margin-bottom: 10px; pointer-events: none; }
        
        .hud-counters { display: flex; justify-content: space-around; background: #0a0a0a; padding: 15px; border-radius: 20px; border: 1px solid #1a1a1a; margin-bottom: 20px; pointer-events: none; }
        .hud-item { text-align: center; flex: 1; }
        .hud-label { font-size: 0.55rem; color: #444; text-transform: uppercase; font-weight: 800; }
        .hud-val { font-size: 1.5rem; font-weight: 900; display: block; margin-top: 5px; color: #fff; }

        /* THE CAT GRID */
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; position: relative; z-index: 6000; }
        .cat-btn { background: #111; border: 1px solid #222; color: #555; padding: 15px 5px; border-radius: 12px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; transform: translateZ(0); }
        .cat-btn.active { border-color: #fff; color: #fff; background: #1a1a1a; }

        .search-results { 
            background: #161618; border-radius: 18px; margin-bottom: 20px; 
            max-height: 350px; overflow-y: auto; display: none; border: 1px solid #333;
            position: relative; z-index: 6000;
        }
        .search-item { padding: 16px; border-bottom: 1px solid #222; }
        .time-options { display: flex; gap: 8px; margin-top: 12px; }
        .time-btn { flex: 1; background: #222; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; font-size: 0.65rem; font-weight: 700; transform: translateZ(0); }

        .history-container { margin-top: 20px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #111; font-size: 0.8rem; color: #333; }
        .remove-btn { background: #1a1a1a; border: none; color: #DA0A13; padding: 8px 12px; border-radius: 8px; font-size: 0.6rem; font-weight: 800; transform: translateZ(0); }
    </style>
</head>
<body>

<header>
    <div id="stage-pill">Sober</div>
    <div class="bac-display" id="bac">.0000</div>
</header>

<div class="hud-counters">
    <div class="hud-item"><span class="hud-label">Shots</span><span class="hud-val" id="shot-count" style="color: var(--impaired);">0</span></div>
    <div class="hud-item"><span class="hud-label">Cans/Mixed</span><span class="hud-val" id="can-count" style="color: var(--social);">0</span></div>
</div>

<div class="cat-grid" id="cat-grid">
    <div class="cat-btn" data-cat="beer">Beer</div>
    <div class="cat-btn" data-cat="seltz">Seltz/Tea</div>
    <div class="cat-btn" data-cat="mixed">Mixed</div>
    <div class="cat-btn" data-cat="liquor">Liquor</div>
    <div class="cat-btn" data-cat="wine">Wine</div>
    <div class="cat-btn" data-cat="cider">Cider</div>
</div>

<div id="results" class="search-results"></div>

<div class="history-container" id="history-list"></div>

<button id="purge-btn" style="margin-top:40px; width:100%; background:none; border:none; color:#1a1a1a; font-size:0.6rem; letter-spacing:3px; padding:20px;">PURGE SYSTEM</button>

<script>
    const drinkDB = {
        beer: [{n:"Michelob Ultra",a:0.042,v:12},{n:"Busch Light",a:0.041,v:12},{n:"Coors Banquet",a:0.05,v:12},{n:"Voodoo Ranger",a:0.09,v:12}],
        seltz: [{n:"Surfside Tea",a:0.045,v:12},{n:"Surfside Lemon",a:0.045,v:12},{n:"High Noon",a:0.045,v:12},{n:"BeatBox",a:0.111,v:16.9}],
        mixed: [{n:"Long Island",a:0.22,v:12},{n:"Margarita",a:0.15,v:8},{n:"Vodka Soda",a:0.09,v:10}],
        liquor: [{n:"Tequila Shot",a:0.4,v:1.5,s:true},{n:"Vodka Shot",a:0.4,v:1.5,s:true},{n:"Fireball",a:0.33,v:1.5,s:true}],
        wine: [{n:"Red Wine",a:0.13,v:5},{n:"White Wine",a:0.12,v:5}],
        cider: [{n:"Angry Orchard",a:0.05,v:12},{n:"Downeast",a:0.051,v:12}]
    };

    let session = JSON.parse(localStorage.getItem('tab_v20_session')) || [];
    let bio = { weight: 175, sex: 0.68 }; 

    function bind(el, func) {
        el.addEventListener('touchstart', (e) => { e.preventDefault(); func(e); }, {passive: false});
    }

    function update() {
        const now = Date.now();
        let totalBac = 0, sCount = 0, cCount = 0;
        const metabolismRate = 0.015;

        session.forEach(d => {
            const hrsSince = (now - d.time) / 3600000;
            const rawBac = (d.oz * d.abv * 5.14) / (bio.weight * bio.sex);
            const decayedBac = rawBac - (metabolismRate * hrsSince);
            if (decayedBac > 0) totalBac += decayedBac;
            if (d.isShot) sCount++; else cCount++;
        });

        document.getElementById('bac').innerText = totalBac.toFixed(4).substring(1);
        document.getElementById('shot-count').innerText = sCount;
        document.getElementById('can-count').innerText = cCount;

        let color = "var(--safe)", stage = "Sober";
        if (totalBac >= 0.02) { color = "var(--social)"; stage = "Euphoria"; }
        if (totalBac >= 0.08) { color = "var(--impaired)"; stage = "Excitement"; }
        if (totalBac >= 0.18) { color = "var(--danger)"; stage = "Confusion"; }

        const pill = document.getElementById('stage-pill');
        pill.innerText = stage; pill.style.color = color; pill.style.borderColor = color;
        document.getElementById('bac').style.color = color;

        const hist = document.getElementById('history-list');
        hist.innerHTML = session.slice().reverse().slice(0, 5).map(d => `
            <div class="history-item">
                <span>${d.name} <small style="color:#222; margin-left:10px;">${new Date(d.time).getHours()}:${(new Date(d.time).getMinutes()<10?'0':'')+new Date(d.time).getMinutes()}</small></span>
                <div class="remove-btn" data-id="${d.id}">Remove</div>
            </div>
        `).join('');

        document.querySelectorAll('.remove-btn').forEach(rb => {
            bind(rb, () => {
                session = session.filter(s => s.id != rb.getAttribute('data-id'));
                save();
            });
        });
    }

    function save() {
        localStorage.setItem('tab_v20_session', JSON.stringify(session));
        update();
    }

    document.querySelectorAll('.cat-btn').forEach(btn => {
        bind(btn, () => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const cat = btn.getAttribute('data-cat');
            const res = document.getElementById('results');
            res.innerHTML = drinkDB[cat].map(d => `
                <div class="search-item">
                    <div style="display:flex; justify-content:space-between; font-weight:700; font-size:0.9rem;">
                        <span>${d.n}</span><span>${(d.a*100).toFixed(1)}%</span>
                    </div>
                    <div class="time-options">
                        <div class="time-btn add-now" data-n="${d.n}" data-v="${d.v}" data-a="${d.a}" data-s="${d.s||''}" data-o="0">Now</div>
                        <div class="time-btn add-now" data-n="${d.n}" data-v="${d.v}" data-a="${d.a}" data-s="${d.s||''}" data-o="30">-30m</div>
                    </div>
                </div>
            `).join('');
            res.style.display = 'block';

            document.querySelectorAll('.add-now').forEach(ab => {
                bind(ab, () => {
                    session.push({
                        name: ab.getAttribute('data-n'),
                        oz: parseFloat(ab.getAttribute('data-v')),
                        abv: parseFloat(ab.getAttribute('data-a')),
                        isShot: !!ab.getAttribute('data-s'),
                        time: Date.now() - (parseInt(ab.getAttribute('data-o')) * 60000),
                        id: Math.random()
                    });
                    save();
                });
            });
        });
    });

    bind(document.getElementById('purge-btn'), () => { if(confirm('Wipe?')){localStorage.clear(); location.reload();} });

    update();
    setInterval(update, 2000);
</script>
</body>
</html>
