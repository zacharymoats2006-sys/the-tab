<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>THE TAB v18.3</title>
    <style>
        :root {
            --bg-color: #000;
            --card-bg: #1c1c1e;
            --accent-blue: #0a84ff;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --border: #333;
            --beer-gold: #ffcc00;
            --seltz-purple: #5856d6;
            --shot-red: #ff3b30;
            --custom-green: #34c759;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
        }

        .dashboard, .settings-panel, .inventory-section {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .bac-display {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--accent-blue);
            margin: 5px 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 12px;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 10px;
            text-align: left;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            background: #2c2c2e;
            border: 1px solid var(--border);
            color: white;
            padding: 15px 10px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.1s;
        }

        button:active { transform: scale(0.96); filter: brightness(1.2); }

        .beer-btn { border-left: 5px solid var(--beer-gold); }
        .seltz-btn { border-left: 5px solid var(--seltz-purple); }
        .shot-btn { border-left: 5px solid var(--shot-red); }
        .custom-btn { border-left: 5px solid var(--custom-green); }

        .input-group { margin: 10px 0; text-align: left; }
        input { width: 100%; background: #2c2c2e; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; box-sizing: border-box; }
        
        .hidden { display: none; }
        small { color: var(--text-dim); display: block; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="dashboard" id="mainUI">
        <div style="font-size: 0.8rem; color: var(--text-dim);">ESTIMATED BAC</div>
        <div class="bac-display" id="bac">0.000</div>
        
        <div class="stats-grid">
            <div class="stat-box">
                <div style="font-size: 0.7rem;">TOTAL DRINKS</div>
                <div id="total-count" style="font-size: 1.2rem;">0</div>
            </div>
            <div class="stat-box">
                <div style="font-size: 0.7rem;">TIME SINCE LAST</div>
                <div id="timer" style="font-family: monospace;">00:00:00</div>
            </div>
        </div>
        <button onclick="toggleSettings()" style="padding: 8px 15px; font-size: 0.7rem; border-radius: 20px; background: transparent;">Edit Profile</button>
    </div>

    <div id="inventoryUI" style="width: 100%; max-width: 420px;">
        <div class="section-title">Beers & Seltzers</div>
        <div class="btn-grid">
            <button class="beer-btn" onclick="addDrink(0.05, 12, 'Coors Banquet')">Coors Banquet<small>12oz 5%</small></button>
            <button class="beer-btn" onclick="addDrink(0.042, 12, 'Miller Lite')">Miller Lite<small>12oz 4.2%</small></button>
            <button class="seltz-btn" onclick="addDrink(0.045, 12, 'High Noon')">High Noon<small>12oz 4.5%</small></button>
            <button class="seltz-btn" onclick="addDrink(0.05, 12, 'White Claw')">White Claw<small>12oz 5%</small></button>
        </div>

        <div class="section-title">Liquor & Custom</div>
        <div class="btn-grid">
            <button class="shot-btn" onclick="addDrink(0.40, 1.5, 'Standard Shot')">Shot<small>1.5oz 40%</small></button>
            <button class="shot-btn" onclick="addDrink(0.35, 1.5, 'Flavored Shot')">Shot<small>1.5oz 35%</small></button>
            <button class="custom-btn" onclick="showCustomAdd()">+ New Custom</button>
            <button class="custom-btn" style="border-color: #ff9500;" onclick="resetTab()">Reset Tab</button>
        </div>

        <div id="custom-list" class="btn-grid">
            </div>
    </div>

    <div class="settings-panel hidden" id="settingsUI">
        <h3>User Profile</h3>
        <div class="input-group">
            <label>Weight (lbs)</label>
            <input type="number" id="userWeight" value="180" onchange="saveProfile()">
        </div>
        <div class="input-group">
            <label>Height: <span id="heightLabel">5'10"</span></label>
            <input type="range" id="userHeight" min="48" max="84" value="70" oninput="updateHeightLabel()" onchange="saveProfile()">
        </div>
        <div class="input-group">
            <label>Age</label>
            <input type="number" id="userAge" value="21" onchange="saveProfile()">
        </div>
        <button onclick="toggleSettings()" style="width: 100%; background: var(--accent-blue); margin-top: 20px;">Save & Close</button>
    </div>

    <script>
        let profile = JSON.parse(localStorage.getItem('tabProfile')) || { weight: 180, heightInches: 70, age: 21 };
        let sessionData = JSON.parse(localStorage.getItem('tabSession')) || { startTime: null, lastDrinkTime: null, totalAlcoholOz: 0, drinkCount: 0 };
        let customInventory = JSON.parse(localStorage.getItem('customDrinks')) || [];

        function updateHeightLabel() {
            const inches = document.getElementById('userHeight').value;
            const ft = Math.floor(inches / 12);
            const inch = inches % 12;
            document.getElementById('heightLabel').innerText = `${ft}'${inch}"`;
        }

        function saveProfile() {
            profile.weight = parseFloat(document.getElementById('userWeight').value) || 180;
            profile.heightInches = parseInt(document.getElementById('userHeight').value) || 70;
            profile.age = parseInt(document.getElementById('userAge').value) || 21;
            localStorage.setItem('tabProfile', JSON.stringify
