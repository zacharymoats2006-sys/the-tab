<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>THE TAB</title>
    <style>
        :root { 
            --safe: #00ff88; --social: #00ccff; --buzzed: #FFCC00; 
            --impaired: #ff9900; --danger: #DA0A13; --critical: #7a0000; --dark: #000; 
        }
        body { 
            background: var(--dark); color: #fff; font-family: -apple-system, system-ui;
            margin: 0; padding: env(safe-area-inset-top) 20px 100px 20px;
        }
        header { text-align: center; padding: 10px 0; }
        .bac-display { font-size: 6rem; font-weight: 900; line-height: 1; letter-spacing: -4px; margin: 5px 0; transition: color 0.4s; }
        
        /* Stages Display */
        #stage-pill { display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; border: 1px solid #333; margin-bottom: 10px; }
        #analysis { font-size: 0.85rem; color: #888; margin: 5px 0 15px; min-height: 3em; line-height: 1.4; }

        .bio-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; background: #111; padding: 15px; border-radius: 20px; border: 1px solid #222; }
        .field { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.6rem; color: #555; text-transform: uppercase; font-weight: 800; }
        input, select { background: #1c1c1e; border: none; color: #fff; padding: 10px; border-radius: 10px; font-size: 0.9rem; width: 100%; box-sizing: border-box; }

        .gauge-container { width: 100%; height: 4px; background: #222; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #fuel-bar { height: 100%; width: 0%; transition: 1s cubic-bezier(0.075, 0.82, 0.165, 1); background: var(--safe); }

        /* Projection Box */
        .projection-box { background: #111; border: 1px dashed #333; border-radius: 15px; padding: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .proj-label { font-size: 0.65rem; color: #444; text-transform: uppercase; font-weight: 700; }
        .proj-val { font-size: 0.9rem; font-weight: 700; color: #666; }

        .search-box { position: sticky; top: 10px; z-index: 100; margin-bottom: 20px; }
        #drink-search { width: 100%; padding: 16px; border-radius: 18px; border: 1px solid #333; background: #1c1c1e; color: #fff; font-size: 1rem; box-sizing: border-box; }
        .search-results { background: #1c1c1e; border-radius: 18px; margin-top: 8px; max-height: 250px; overflow-y: auto; display: none; border: 1px solid #333; }
        .search-item { padding: 16px; border-bottom: 1px solid #2c2c2e; display: flex; justify-content: space-between; }

        .recovery-stats { display: flex; justify-content: space-around; background: #111; padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #222; }
        .stat-val { font-size: 1.1rem; font-weight: 700; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div id="stage-pill">Sober</div>
        <div class="bac-display" id="bac">.000</div>
        <div class="gauge-container"><div id="fuel-bar"></div></div>
        <div id="analysis">Diagnostic standing by...</div>
    </header>

    <div class="projection-box">
        <span class="proj-label">T+1 Hour Projection</span>
        <span class="proj-val" id="projection">BAC .000</span>
    </div>

    <div class="bio-grid">
        <div class="field"><label>Age</label><input type="number" id="age" value="21" onchange="saveBio()"></div>
        <div class="field"><label>Weight</label><input type="number" id="weight" value="175" onchange="saveBio()"></div>
        <div class="field">
            <label>Height</label>
            <select id="height" onchange="saveBio()">
                <option value="64">5'4"</option><option value="68">5'8"</option>
                <option value="70" selected>5'10"</option><option value="72">6'0"</option>
                <option value="76">6'4"</option>
            </select>
        </div>
    </div>

    <div class="recovery-stats">
        <div class="stat-block"><label style="font-size:0.6rem; color:#555; text-transform:uppercase;">Clear In</label><div class="stat-val" id="countdown">0h 0m</div></div>
        <div class="stat-block"><label style="font-size:0.6rem; color:#555; text-transform:uppercase;">Morning Ready</label><div class="stat-val" id="cleartime">--:--</div></div>
    </div>

    <div class="search-box">
        <input type="text" id="drink-search" placeholder="Search Brand..." oninput="searchDrinks()">
        <div id="results" class="search-results"></div>
    </div>

    <div id="history-list"></div>
    <button onclick="if(confirm('Wipe session?')){localStorage.clear(); location.reload();}" style="margin:40px 0; width:100%; background:none; border:none; color:#222; font-size:0.6rem; letter-spacing:2px;">PURGE SYSTEM</button>
</div>

<script>
    const drinkDB = [
        { name: "Coors Banquet", abv: 0.05, oz: 12 }, { name: "High Noon", abv: 0.045, oz: 12 },
        { name: "White Claw", abv: 0.05, oz: 12 }, { name: "Bud Light", abv: 0.042, oz: 12 },
        { name: "IPA (Strong)", abv: 0.075, oz: 12 }, { name: "Standard Shot", abv: 0.40, oz: 1.5 },
        { name: "Mixed Drink", abv: 0.15, oz: 6 }
    ];

    let session = JSON.parse(localStorage.getItem('tab_v5_session')) || [];
    let bio = JSON.parse(localStorage.getItem('tab_v5_bio')) || { age: 21, weight: 175, height: 70, sex: 0.68 };

    document.getElementById('age').value = bio.age;
    document.getElementById('weight').value = bio.weight;
    document.getElementById('height').value = bio.height;

    function saveBio() {
        bio = {
            age: parseInt(document.getElementById('age').value),
            weight: parseInt(document.getElementById('weight').value),
            height: parseInt(document.getElementById('height').value),
            sex: 0.68 // Default to 0.68 for calculation
        };
        localStorage.setItem('tab_v5_bio', JSON.stringify(bio));
        update();
    }

    function searchDrinks() {
        const query = document.getElementById('drink-search').value.toLowerCase();
        const resDiv = document.getElementById('results');
        if(!query) { resDiv.style.display = 'none'; return; }
        const filtered = drinkDB.filter(d => d.name.toLowerCase().includes(query));
        resDiv.innerHTML = filtered.map(d => `
            <div class="search-item" onclick="add('${d.name}', ${d.oz}, ${d.abv})">
                <span>${d.name} <small style="color:#555">${(d.abv*100).toFixed(1)}%</small></span>
                <span style="color:var(--social); font-weight:800;">+</span>
            </div>
        `).join('');
        resDiv.style.display = 'block';
    }

    function add(name, oz, abv) {
        session.push({ name, oz, abv, time: Date.now() });
        localStorage.setItem('tab_v5_session', JSON.stringify(session));
        document.getElementById('drink-search').value = "";
        document.getElementById('results').style.display = 'none';
        update();
    }

    function update() {
        const now = Date.now();
        let currentBac = 0;
        let futureBac = 0;
        const metabolism = 0.015;

        session.forEach(d => {
            const hrs = (now - d.time) / 3600000;
            const pureOz = d.oz * d.abv;
            let drinkBac = (pureOz * 5.14 / (bio.weight * bio.sex)) - (metabolism * hrs);
            if (drinkBac > 0) currentBac += drinkBac;

            // Future projection (in 1 hour)
            let futBac = (pureOz * 5.14 / (bio.weight * bio.sex)) - (metabolism * (hrs + 1));
            if (futBac > 0) futureBac += futBac;
        });

        document.getElementById('bac').innerText = currentBac.toFixed(3).replace('0.', '.');
        document.getElementById('projection').innerText = `BAC ${futureBac.toFixed(3).replace('0.', '.')}`;
        
        const fuelPerc = Math.min((currentBac / 0.08) * 100, 100);
        document.getElementById('fuel-bar').style.width = fuelPerc + "%";

        // STAGES OF INTOXICATION
        let s = { name: "Sober", col: "var(--safe)", desc: "Normal behavior. No impairment detected." };
        if (currentBac >= 0.40) s = { name: "Lethal", col: "var(--critical)", desc: "CRITICAL: High risk of death. Emergency medical attention required." };
        else if (currentBac >= 0.25) s = { name: "Stupor", col: "var(--critical)", desc: "Loss of motor function. Risk of asphyxiation. Do not leave alone." };
        else if (currentBac >= 0.18) s = { name: "Confusion", col: "var(--danger)", desc: "Significant disorientation. Blackouts likely. Emotional outbursts." };
        else if (currentBac >= 0.09) s = { name: "Excitement", col: "var(--impaired)", desc: "Loss of judgment. Slurred speech. Peripheral vision impairment." };
        else if (currentBac >= 0.03) s = { name: "Euphoria", col: "var(--social)", desc: "Increased confidence and talkativeness. Lowered inhibitions." };
        else if (currentBac > 0.01) s = { name: "Subclinical", col: "var(--safe)", desc: "Behavior nearly normal. Subtle mood shifts." };

        const pill = document.getElementById('stage-pill');
        pill.innerText = s.name; pill.style.color = s.col; pill.style.borderColor = s.col;
        document.getElementById('bac').style.color = s.col;
        document.getElementById('fuel-bar').style.background = s.col;
        document.getElementById('analysis').innerText = s.desc;

        const hrsToSober = currentBac / metabolism;
        document.getElementById('countdown').innerText = `${Math.floor(hrsToSober)}h ${Math.floor((hrsToSober % 1) * 60)}m`;

        if (currentBac > 0) {
            const sTime = new Date(now + hrsToSober * 3600000);
            document.getElementById('cleartime').innerText = sTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        document.getElementById('history-list').innerHTML = session.map(d => {
            const t = new Date(d.time);
            return `<div class="history-item"><span>${d.name}</span><span style="color:#333">${t.getHours()}:${(t.getMinutes()<10?'0':'')+t.getMinutes()}</span></div>`;
        }).reverse().slice(0, 5).join('');
    }

    update();
    setInterval(update, 15000);
</script>
</body>
</html>
